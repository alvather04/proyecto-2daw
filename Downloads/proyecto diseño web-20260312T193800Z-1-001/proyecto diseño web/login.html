<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Nexus Hub</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">Nexus Hub</div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#comunidades">Comunidades</a></li>
                <li><a href="#perfil">Mi Perfil</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <!-- LOGIN SECTION -->
    <section class="login-section">
        <div class="login-container">
            <div class="login-header">
                <h2>Iniciar Sesión</h2>
                <p>Accede a tu cuenta de Nexus Hub</p>
            </div>
            <div class="login-form-box">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Tu contraseña">
                    </div>
                    <button type="submit" class="btn-login">Iniciar Sesión</button>
                </form>
                <div class="login-links">
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    <a href="#" class="register-link">¿No tienes cuenta? Regístrate</a>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Nexus Hub. Sitio fan no oficial. League of Legends es propiedad de Riot Games.</p>
    </footer>

    <script>
        // Simple form validation (you can expand this)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email && password) {
                alert('Inicio de sesión exitoso (simulado)');
                // Here you would typically send the data to a server
            } else {
                alert('Por favor, completa todos los campos');
            }
        });
    </script>
</body>
</html>
